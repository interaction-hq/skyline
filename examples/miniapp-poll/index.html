<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      content="width=device-width, initial-scale=1, viewport-fit=cover"
      name="viewport"
    >
    <title>Quick Poll</title>
    <style>
    :root {
      color-scheme: light dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      padding: 20px;
      margin: 0;
      font:
        16px / 1.4 -apple-system,
        system-ui,
        sans-serif;
      background: transparent;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 20px;
    }
    .option {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      font: inherit;
      color: inherit;
      text-align: left;
      cursor: pointer;
      background: color-mix(in srgb, currentColor 8%, transparent);
      border: none;
      border-radius: 14px;
      transition:
        transform 0.08s ease,
        background 0.15s ease;
    }
    .option:active {
      transform: scale(0.98);
    }
    .option.selected {
      color: #fff;
      background: #0a84ff;
    }
    </style>
  </head>
  <body>
    <h1>lunch friday?</h1>
    <div id="options"></div>

    <script type="module">
    import { app } from "https://esm.sh/@interactions-hq/skyline/app";

    const OPTIONS = ["tacos", "sushi", "pizza"];
    const root = document.getElementById("options");

    for (const label of OPTIONS) {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.textContent = label;
      btn.onclick = () => vote(label, btn);
      root.appendChild(btn);
    }

    function vote(choice, el) {
      document
        .querySelectorAll(".option")
        .forEach((b) => b.classList.remove("selected"));
      el.classList.add("selected");
      app.sendMessage({
        caption: `voted: ${choice}`,
        data: { choice, poll: "lunch-friday" },
        subcaption: "lunch friday?",
        summary: `voted ${choice}`,
        trailingCaption: "1 vote",
      });
    }

    // React to the other person's vote arriving, and update our own bubble's
    // tally in place instead of posting a new one.
    let tally = 1;
    app.on("message", (msg) => {
      tally += 1;
      app.updateBubble({
        caption: "lunch friday?",
        data: { poll: "lunch-friday" },
        trailingCaption: `${tally} votes`,
      });
    });

    app.ready();
    </script>
  </body>
</html>
