syntax = "proto3";
package interactions.imessage.v1;

option swift_prefix = "PIMsg_";

import "google/protobuf/timestamp.proto";
import "message_service.proto";

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service PollService {
  rpc CreatePoll(CreatePollRequest) returns (MessageCommandReceiptResponse);
  rpc Vote(VoteRequest) returns (MessageCommandReceiptResponse);
  rpc Unvote(UnvoteRequest) returns (MessageCommandReceiptResponse);
  rpc AddOption(AddOptionRequest) returns (MessageCommandReceiptResponse);
  rpc GetPoll(GetPollRequest) returns (PollInfoResponse);
  rpc SubscribeEvents(SubscribePollEventsRequest) returns (stream PollEvent);
}

// ---------------------------------------------------------------------------
// Types
// ---------------------------------------------------------------------------

message PollOption {
  string text = 1;
  optional string option_identifier = 2;
  optional string creator_handle = 3;
}

message PollVote {
  string option_identifier = 1;
  optional string participant_address = 2;
}

message PollInfoResponse {
  string message_guid = 1;
  string chat_guid = 2;
  string title = 3;
  repeated PollOption options = 4;
  repeated PollVote votes = 5;
}

// ---------------------------------------------------------------------------
// Request / Response messages
// ---------------------------------------------------------------------------

message CreatePollRequest {
  string chat_guid = 1;
  string title = 2;
  repeated string options = 3;
}

message VoteRequest {
  string chat_guid = 1;
  string poll_message_guid = 2;
  string option_identifier = 3;
}

message UnvoteRequest {
  string chat_guid = 1;
  string poll_message_guid = 2;
}

message AddOptionRequest {
  string chat_guid = 1;
  string poll_message_guid = 2;
  string option_text = 3;
}

message GetPollRequest {
  string message_guid = 1;
}

message SubscribePollEventsRequest {}

message PollEvent {
  google.protobuf.Timestamp timestamp = 1;
  oneof payload {
    PollChangeEvent poll_changed = 2;
  }
}

message PollChangeEvent {
  string chat_guid = 1;
  string poll_message_guid = 2;
  MessageResponse message = 3;
  string action = 4;  // "created" | "voted" | "unvoted" | "optionAdded"
}
