// Common types for interactions.slack.v1.
syntax = "proto3";
package interactions.slack.v1;

import "google/protobuf/timestamp.proto";

message StreamCursor {
  string opaque = 1;
}

message Heartbeat {
  google.protobuf.Timestamp at = 1;
}

message InboundMessage {
  string channel = 1;
  string user = 2;
  string text = 3;
  string ts = 4;
  optional string thread_ts = 5;
  optional string subtype = 6;
  bool is_from_me = 7;
  repeated File files = 10;
}

message Reaction {
  string user = 1;
  string item_channel = 2;
  string item_ts = 3;
  string name = 4;
  bool removed = 5;
  bool is_from_me = 6;
}

message InteractiveCallback {
  string type = 1;
  string user = 2;
  bool is_from_me = 3;
  string raw_payload_json = 10;
}

message SlashCommand {
  string command = 1;
  string text = 2;
  string user = 3;
  string channel = 4;
  string response_url = 5;
  string trigger_id = 6;
  bool is_from_me = 7;
}

message AppMention {
  string channel = 1;
  string user = 2;
  string text = 3;
  string ts = 4;
  bool is_from_me = 5;
}

message File {
  string id = 1;
  string name = 2;
  string mimetype = 3;
  int64 size = 4;
  string url_private = 5;
}
